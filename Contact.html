    <h1>contact us
    </h1>
    <section class="container">
        <div style="max-width:500px; margin: 4rem auto;background-color: white;padding: 2rem;border-radius: 50px;box-shadow: 0 4px 15px(rgba(0,0,0,0.1))">
<h2 style="margin-bottom: 1rem;color: #d52b1e;"> Plan Your Journey</h2>
<p style="margin-bottom: 2 rem;">Have questions about your Swiss adventure? 
    send us a message and our local experts will get back to you
</p>
<form action="#" method="POST" class="contact-form">
    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Your name" required>
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="Email" placeholder="your email adress" required>
    </div>
    <div class="form-group">
        <label for="subject"> Interested In </label>
        <select id="subject" name="subject">
            <option value="hiking"> hiking & nature</option>
            <option value="skiing"> skiing</option>
            <option value="Luxury">Luxury & Gastronomy</option>
            <option value="other">General Inquiry </option>
        </select>
    </div>
    <div class="form-group">
        <label for="message">Your message</label>
        <textarea id="message" name="message" rows="5" placeholder="how can we help you?"></textarea>
    </div>
    <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer; font-size: 1 rem;"> send message</button>
</form>
        </div>
    </section>
    <footer> 
            <p>&copy;2026 Swiss explore all rights resrved</p>
        </footer>
